name: Deploy Social Media Tracker

on:
  push:
    branches: [main]
    paths:
      - 'social-media-tracker/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build dashboard
        run: node social-media-tracker/scripts/build-dashboard.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: social-media-tracker/public

      - id: deployment
        uses: actions/deploy-pages@v4
