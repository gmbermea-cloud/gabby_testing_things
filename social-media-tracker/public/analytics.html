<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Content Analytics — @gabbybermea</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0A0A0A;--card:#111111;--elevated:#181818;--border:#222222;--terracotta:#C4603A;--gold:#D4A843;--cream:#E8D5BC;--text:#F0EAE0;--dim:#7A7268;--font-d:'Bebas Neue',sans-serif;--font-m:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-m);font-size:13px}
a{color:inherit;text-decoration:none}

/* header */
header{border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:baseline;gap:16px;position:sticky;top:0;background:rgba(10,10,10,.95);backdrop-filter:blur(12px);z-index:10}
header h1{font-family:var(--font-d);font-size:28px;letter-spacing:1px}
header span{color:var(--dim);font-size:11px}
header a{margin-left:auto;font-size:11px;color:var(--terracotta);border:1px solid var(--terracotta);padding:4px 10px}

/* layout */
main{max-width:1100px;margin:0 auto;padding:24px 20px}
section{margin-bottom:40px}
h2{font-family:var(--font-d);font-size:20px;letter-spacing:1px;color:var(--cream);margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px}

/* stat cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--border);padding:16px}
.card .label{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.card .value{font-family:var(--font-d);font-size:30px;letter-spacing:1px}
.card .sub{font-size:10px;color:var(--dim);margin-top:4px}
.card.ig .value{color:#C4603A}
.card.tt .value{color:#E8C37A}
.card.yt .value{color:#D46B3A}
.card.li .value{color:#D4A843}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:6px 14px;font-family:var(--font-m);font-size:11px;background:none;border:1px solid var(--border);color:var(--dim);cursor:pointer;letter-spacing:.5px}
.tab.active{border-color:var(--terracotta);color:var(--terracotta)}

/* table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:8px 10px;color:var(--dim);font-weight:400;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4}
tr:hover td{background:var(--elevated)}
.hook{max-width:320px;color:var(--cream)}
.pill{display:inline-block;padding:1px 6px;font-size:10px;border:1px solid var(--border);color:var(--dim);white-space:nowrap}
.pill.Licensure{border-color:#C4603A;color:#C4603A}
.pill.Equity{border-color:#D4A843;color:#D4A843}
.pill.Career{border-color:#A0785A;color:#A0785A}
.pill.Day{border-color:#7A7268;color:#7A7268}
.num{text-align:right;font-variant-numeric:tabular-nums}

/* chart */
.chart-wrap{background:var(--card);border:1px solid var(--border);padding:20px;position:relative;height:260px}
</style>
</head>
<body>
<header>
  <h1>CONTENT ANALYTICS</h1>
  <span id="updated"></span>
  <a href="index.html">← TRACKER</a>
</header>
<main>

  <section id="s-stats">
    <h2>PLATFORM OVERVIEW</h2>
    <div class="cards" id="statCards"></div>
  </section>

  <section id="s-growth">
    <h2>FOLLOWER GROWTH</h2>
    <div class="chart-wrap"><canvas id="growthChart"></canvas></div>
  </section>

  <section id="s-posts">
    <h2>TOP POSTS</h2>
    <div class="tabs" id="postTabs"></div>
    <div class="tbl-wrap"><table id="postTable">
      <thead><tr>
        <th>#</th><th>HOOK</th><th>PILLAR</th>
        <th class="num">VIEWS</th><th class="num">LIKES</th>
        <th class="num">SAVES</th><th class="num">ER%</th>
        <th>DAY / TIME</th>
      </tr></thead>
      <tbody id="postBody"></tbody>
    </table></div>
  </section>

</main>
<script>
const FILES = ['instagram','tiktok','youtube','linkedin'];
const COLOR = {instagram:'#C4603A',tiktok:'#E8C37A',youtube:'#D46B3A',linkedin:'#D4A843'};
const CLS   = {instagram:'ig',tiktok:'tt',youtube:'yt',linkedin:'li'};
const data  = {};

async function load(){
  await Promise.all(FILES.map(async p=>{
    try{
      const r = await fetch(`../data/analytics/${p}.json`);
      data[p] = await r.json();
    }catch(e){console.warn('Could not load',p,e)}
  }));
  render();
}

function fmt(n){
  if(n==null) return '—';
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return n.toLocaleString();
}

function renderStats(){
  const el = document.getElementById('statCards');
  el.innerHTML = '';
  const defs = [
    {p:'instagram', label:'Instagram', f: d=>d.profile.followers, sub: d=>`~${fmt(d.profile.avg_reel_views)} avg reel views`},
    {p:'tiktok',    label:'TikTok',    f: d=>d.profile.followers, sub: d=>`${d.profile.avg_engagement_rate}% avg ER`},
    {p:'youtube',   label:'YouTube',   f: d=>d.profile.subscribers, sub: d=>`${fmt(d.profile.total_views)} total views`},
    {p:'linkedin',  label:'LinkedIn',  f: d=>d.profile.followers, sub: d=>`${fmt(d.profile.avg_impressions)} avg impressions`},
  ];
  defs.forEach(({p,label,f,sub})=>{
    if(!data[p]) return;
    el.innerHTML += `<div class="card ${CLS[p]}">
      <div class="label">${label}</div>
      <div class="value">${fmt(f(data[p]))}</div>
      <div class="sub">${sub(data[p])}</div>
    </div>`;
  });
}

function renderGrowth(){
  const labels = new Set();
  FILES.forEach(p=>{ if(data[p]) data[p].follower_history?.forEach(h=>labels.add(h.date)) });
  const sorted = [...labels].sort();
  const datasets = FILES.filter(p=>data[p]?.follower_history?.length).map(p=>({
    label: p.charAt(0).toUpperCase()+p.slice(1),
    data: sorted.map(d=> data[p].follower_history.find(h=>h.date===d)?.count ?? null),
    borderColor: COLOR[p], backgroundColor:'transparent',
    tension:.3, spanGaps:true, pointRadius:3
  }));
  new Chart(document.getElementById('growthChart'),{
    type:'line',
    data:{labels:sorted, datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#7A7268',font:{family:'DM Mono',size:11}}}},
      scales:{
        x:{ticks:{color:'#7A7268',maxTicksLimit:8}, grid:{color:'#1A1A1A'}},
        y:{ticks:{color:'#7A7268',callback:v=>fmt(v)}, grid:{color:'#1A1A1A'}}
      }
    }
  });
}

let activePlatform = 'instagram';
function renderTabs(){
  const el = document.getElementById('postTabs');
  el.innerHTML = FILES.filter(p=>data[p]?.top_posts?.length).map(p=>`
    <button class="tab${p===activePlatform?' active':''}" onclick="switchTab('${p}')">
      ${p.toUpperCase()}
    </button>`).join('');
}
function switchTab(p){ activePlatform=p; renderTabs(); renderPostTable(); }

function renderPostTable(){
  const posts = data[activePlatform]?.top_posts || [];
  const usesImpressions = activePlatform==='linkedin';
  document.querySelector('#postTable thead tr').innerHTML = `
    <th>#</th><th>HOOK</th><th>PILLAR</th>
    <th class="num">${usesImpressions?'IMPRESSIONS':'VIEWS'}</th>
    <th class="num">LIKES</th>
    <th class="num">${activePlatform==='youtube'?'COMMENTS':'SAVES'}</th>
    <th class="num">ER%</th><th>DAY / TIME</th>`;
  document.getElementById('postBody').innerHTML = posts.map((p,i)=>{
    const pillarKey = (p.pillar||'').split(' ')[0];
    const views = usesImpressions ? p.impressions : p.views;
    const saves = activePlatform==='youtube' ? p.comments : p.saves;
    const hr = p.hour!=null ? `${p.hour%12||12}${p.hour<12?'a':'p'}` : '—';
    return `<tr>
      <td style="color:var(--dim)">${i+1}</td>
      <td class="hook">${p.hook||'—'}</td>
      <td><span class="pill ${pillarKey}">${p.pillar||'—'}</span></td>
      <td class="num">${fmt(views)}</td>
      <td class="num">${fmt(p.likes)}</td>
      <td class="num">${fmt(saves)}</td>
      <td class="num">${p.er!=null?p.er+'%':'—'}</td>
      <td style="color:var(--dim)">${p.day?.slice(0,3)||'—'} ${hr}</td>
    </tr>`;
  }).join('');
}

function render(){
  const dates = Object.values(data).map(d=>d.scraped_at).filter(Boolean);
  if(dates.length) document.getElementById('updated').textContent = 'UPDATED '+dates[0];
  renderStats();
  renderGrowth();
  renderTabs();
  renderPostTable();
}
