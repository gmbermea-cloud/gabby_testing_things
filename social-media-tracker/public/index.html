<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audience Growth Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-eyebrow">AUDIENCE GROWTH</span>
        <h1 class="header-wordmark">TRACKER</h1>
      </div>
      <div class="header-meta">
        <span class="header-date" id="headerDate"></span>
        <div class="header-actions">
          <button class="btn-ghost" id="exportBtn">EXPORT</button>
          <label class="btn-ghost btn-import" title="Import JSON backup">
            IMPORT
            <input type="file" id="importInput" accept=".json" style="display:none" />
          </label>
          <button class="btn-primary" id="openEntryBtn">+ SAVE SNAPSHOT</button>
        </div>
      </div>
    </div>
  </header>

  <!-- HERO STATS -->
  <section class="hero-stats">
    <div class="stat-card stat-total">
      <div class="stat-label">TOTAL AUDIENCE</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-delta" id="statTotalDelta"></div>
    </div>
    <div class="stat-card stat-engagement">
      <div class="stat-label">AVG ENGAGEMENT</div>
      <div class="stat-value" id="statEngagement">—</div>
      <div class="stat-sub">across tracked platforms</div>
    </div>
    <div class="stat-card stat-top">
      <div class="stat-label">TOP PLATFORM</div>
      <div class="stat-value" id="statTopPlatform">—</div>
      <div class="stat-sub" id="statTopCount"></div>
    </div>
    <div class="stat-card stat-growth">
      <div class="stat-label">FASTEST GROWING</div>
      <div class="stat-value" id="statFastest">—</div>
      <div class="stat-sub" id="statFastestRate"></div>
    </div>
  </section>

  <!-- CHARTS ROW -->
  <!-- QUICK ENTRY PANEL -->
  <section class="quick-entry-section">
    <div class="quick-entry-inner">
      <div class="qe-header">
        <span class="qe-title">LOG THIS WEEK</span>
        <input type="date" class="qe-date" id="qeDate"/>
        <input type="text" class="qe-label" id="qeLabel" placeholder="Label (optional)"/>
      </div>
      <div class="qe-fields" id="qeFields"></div>
      <button class="qe-save" id="qeSaveBtn">SAVE SNAPSHOT</button>
    </div>
  </section>

  <section class="charts-section">
    <div class="chart-block chart-block--wide">
      <div class="chart-header">
        <h2 class="chart-title">FOLLOWER GROWTH</h2>
        <div class="chart-controls">
          <button class="chart-filter active" data-filter="all">ALL</button>
          <button class="chart-filter" data-filter="top3">TOP 3</button>
          <button class="chart-filter" data-filter="small">EMERGING</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="followerChart"></canvas>
      </div>
    </div>
    <div class="chart-block">
      <div class="chart-header">
        <h2 class="chart-title">ENGAGEMENT RATE %</h2>
      </div>
      <div class="chart-wrap">
        <canvas id="engagementChart"></canvas>
      </div>
    </div>
  </section>

  <!-- GOAL PROGRESS -->
  <section class="goals-section">
    <div class="section-header">
      <h2 class="section-title">GOAL PROGRESS</h2>
      <button class="btn-ghost" id="editGoalsBtn">EDIT GOALS</button>
    </div>
    <div class="goals-grid" id="goalsGrid"></div>
  </section>

  <!-- SNAPSHOT HISTORY -->
  <section class="history-section">
    <div class="section-header">
      <h2 class="section-title">SNAPSHOT HISTORY</h2>
      <span class="section-count" id="snapshotCount"></span>
    </div>
    <div class="history-table-wrap">
      <table class="history-table" id="historyTable">
        <thead id="historyHead"></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </section>

  <!-- ENTRY MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">SAVE SNAPSHOT</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group form-group--half">
            <label class="form-label">DATE</label>
            <input type="date" class="form-input" id="inputDate" />
          </div>
          <div class="form-group form-group--half">
            <label class="form-label">LABEL <span class="form-optional">(optional)</span></label>
            <input type="text" class="form-input" id="inputLabel" placeholder="e.g. After campaign" />
          </div>
        </div>

        <div class="form-section-title">FOLLOWERS</div>
        <div class="followers-grid" id="followersGrid"></div>

        <div class="form-section-title">ENGAGEMENT INPUTS <span class="form-optional">(optional — auto-calculates rate)</span></div>
        <div class="engagement-grid" id="engagementGrid"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="cancelBtn">CANCEL</button>
        <button class="btn-primary" id="saveBtn">SAVE SNAPSHOT</button>
      </div>
    </div>
  </div>

  <!-- GOALS EDIT MODAL -->
  <div class="modal-overlay" id="goalsModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">EDIT GOALS</h2>
        <button class="modal-close" id="goalsModalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="goals-edit-grid" id="goalsEditGrid"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="goalsCancelBtn">CANCEL</button>
        <button class="btn-primary" id="goalsSaveBtn">SAVE GOALS</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
